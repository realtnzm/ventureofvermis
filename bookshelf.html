        <script>
            (() => {
                const root = document.documentElement;
                const mediaQuery = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                );
                const userAgent = navigator.userAgent || "";
                const userAgentDataPlatform =
                    navigator.userAgentData?.platform || "";
                const platform = navigator.platform || "";
                const normalizedPlatform =
                    `${userAgentDataPlatform} ${platform} ${userAgent}`.toLowerCase();
                const detectedPlatform = /(mac|iphone|ipad|ipod|ios)/.test(
                    normalizedPlatform,
                )
                    ? "apple"
                    : "non-apple";
                const maybePreloadPlatformFont = () => {
                    if (detectedPlatform !== "non-apple") return;

                    const link = document.createElement("link");
                    link.rel = "preload";
                    link.href = "/assets/Material/SFPro.woff2";
                    link.as = "font";
                    link.type = "font/woff2";
                    link.crossOrigin = "";
                    document.head.append(link);
                };
                const setSystemTheme = () => {
                    root.dataset.theme = mediaQuery.matches ? "dark" : "light";
                };
                root.dataset.platform = detectedPlatform;
                maybePreloadPlatformFont();
                setSystemTheme();

                if (typeof mediaQuery.addEventListener === "function") {
                    mediaQuery.addEventListener("change", setSystemTheme);
                } else {
                    mediaQuery.addListener(setSystemTheme);
                }
            })();
        </script>

            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    const registerWorker = () => {
                        navigator.serviceWorker

        <script>
            (() => {
                const root = document.documentElement;
                let clearHoverResetTimer = 0;

                const isSectionNavEvent = (event) => {
                    const target = event.target;
                    if (!(target instanceof Element)) return false;

                    return Boolean(
                        target.closest(
                            "[data-artifact-side-nav], [data-book-side-nav]",
                        ),
                    );
                };
                const resetStickyHover = (event) => {
                    if (isSectionNavEvent(event)) return;

                    window.dispatchEvent(
                        new CustomEvent("grizz-scroll-reset-hover"),
                    );
                    root.classList.add("is-scroll-resetting-hover");

                    if (clearHoverResetTimer) {
                        window.clearTimeout(clearHoverResetTimer);
                    }

                    clearHoverResetTimer = window.setTimeout(() => {
                        root.classList.remove("is-scroll-resetting-hover");
                        clearHoverResetTimer = 0;
                    }, 180);
                };
                window.addEventListener("wheel", resetStickyHover, {
                    capture: true,
                    passive: true,
                });
                window.addEventListener("touchmove", resetStickyHover, {
                    capture: true,
                    passive: true,
                });
            })();
        </script>
